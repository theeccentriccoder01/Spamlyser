name: Lint

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff codespell

      - name: Run Ruff check
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run codespell
        run: codespell --skip="*.json,*.csv,*.toml,*.lock,*.pyc" --ignore-words-list="te,ba,nd,ser,ist,som,bu,siz"
