name: Lint

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          
      - name: Install Ruff linter
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          
      - name: Run Ruff check
        run: ruff check .
        
      - name: Run Ruff format check
        run: ruff format --check .
