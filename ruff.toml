target-version = "py311"

[lint]
select = [
    "F",   # Pyflakes – logic errors
    "E",   # pycodestyle – style (only those not covered by formatter)
    "W",   # pycodestyle – warnings
    "I",   # isort – import ordering
    "N",   # pep8-naming – naming conventions
    "UP",  # pyupgrade – modern syntax
    "YTT", # flake8-2020 – future-import style
    "B",   # flake8-bugbear – bug detection
    "RUF", # Ruff-specific rules
]

ignore = [
    # The codebase is in active development; these are fine for now:
    "E501",  # line too long
    "N802",  # function name should be lowercase
    "N803",  # argument name should be lowercase
    "N806",  # variable in function should be lowercase
    "B904",  # raise-without-from-inside-except
    "BLE001", # blind-except
    "F401",  # imported but unused (legacy)
    "F811",  # redefinition of unused variable
    "F821",  # undefined name (legacy)
    "E741",  # ambiguous variable name
    "F601",  # dictionary key literal repeated
    "E402",  # module level import not at top of file
]

[lint.per-file-ignores]
"tests/**" = ["B", "N"]
"models/**" = ["N"]
"*.py" = ["E501"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
